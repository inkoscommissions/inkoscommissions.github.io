<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<script>
if (sessionStorage.getItem("adminAuth") !== "true") {
  window.location.href = "/admin/";
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #100e15;
    --bg-elevated: #1a1720;
    --border: #2f2a3a;
    --text: #eeece6;
    --text-dim: #938da0;
    --accent: #b795f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(183, 149, 240, 0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(183, 149, 240, 0.05), transparent 40%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 240px;
    min-height: 100vh;
    background: var(--bg-elevated);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1rem;
    position: relative;
    z-index: 3;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.6rem 1.5rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .sidebar-header span {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.7rem 0.8rem;
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 0.9rem;
    text-decoration: none;
    cursor: default;
    user-select: none;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .sidebar-item.clickable {
    cursor: pointer;
  }

  .sidebar-item.clickable:hover {
    background: rgba(183, 149, 240, 0.08);
    color: var(--text);
  }

  .sidebar-item svg {
    width: 17px;
    height: 17px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 0.6rem;
    font-size: 0.7rem;
    color: #4d4b56;
  }

  /* Main content */
  .main {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .cursor-glow {
    position: fixed;
    left: 0;
    top: 0;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(183, 149, 240, 0.10) 0%, rgba(183, 149, 240, 0.04) 35%, transparent 70%);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }

  .hero {
    text-align: center;
    position: relative;
    z-index: 2;
    padding: 2rem;
  }

  .emoji {
    font-size: 4.5rem;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.6rem;
    margin-bottom: 1rem;
  }

  p {
    color: var(--text-dim);
    line-height: 1.6;
  }

  @media (max-width: 700px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-height: auto;
      flex-direction: row;
      align-items: center;
      overflow-x: auto;
    }
    .sidebar-header { border-bottom: none; padding: 0.5rem; margin: 0; }
    .sidebar-nav { flex-direction: row; }
    .sidebar-footer { display: none; }
  }
</style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <span class="dot"></span>
      <span>Admin Panel</span>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        Commissions
      </div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        Stats
      </div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </div>
    </nav>

    <div class="sidebar-footer">Made by Mo_2885</div>
  </div>

  <div class="main">
    <div class="cursor-glow" id="g"></div>
    <div class="hero">
      <div class="emoji">⌂</div>
      <h1>Admin Dashboard</h1>
      <p>This page is currently under development.<br>Come back later.</p>
    </div>
  </div>

  <script>
    const g = document.getElementById("g");
    addEventListener("mousemove", e => {
      g.style.left = e.clientX + "px";
      g.style.top = e.clientY + "px";
    });
  </script>
</body>
</html>
