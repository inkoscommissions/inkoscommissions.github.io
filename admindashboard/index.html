<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Dashboard</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>:root{--bg:#100e15;--text:#eeece6;--text-dim:#938da0}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:#100e15;background-image:radial-gradient(circle at 15% 20%,rgba(183,149,240,.08),transparent 40%),radial-gradient(circle at 85% 80%,rgba(183,149,240,.05),transparent 40%);min-height:100vh;display:flex;justify-content:center;align-items:center;color:var(--text);overflow:hidden}.cursor-glow{position:fixed;left:0;top:0;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(183,149,240,.1)0%,rgba(183,149,240,.04)35%,transparent 70%);transform:translate(-50%,-50%);pointer-events:none}.hero{text-align:center;position:relative;z-index:2}.emoji{font-size:5rem;margin-bottom:1rem}h1{font-family:"Space Grotesk",sans-serif;font-size:3rem;margin-bottom:1rem}p{color:var(--text-dim);line-height:1.6}.footer{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:.75rem;color:#4d4b56}</style></head><body><div class="cursor-glow" id="g"></div><div class="hero"><div class="emoji">🙂</div><h1>Admin Dashboard</h1><p>This page is currently under development.<br>Come back later.</p></div><div class="footer">Made by Mo_2885</div><script>const g=document.getElementById("g");addEventListener("mousemove",e=>{g.style.left=e.clientX+"px";g.style.top=e.clientY+"px";});</script></body></html>
