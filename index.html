<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkos Commissions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #14141a;
      color: #f2f0eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    h2.section-title {
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
    }
    p.subtitle {
      color: #a8a5a0;
      font-size: 1.1rem;
      max-width: 500px;
      margin-bottom: 2.5rem;
    }
    form {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: left;
    }
    label {
      font-size: 0.85rem;
      color: #a8a5a0;
      margin-bottom: 0.3rem;
      display: block;
    }
    input, textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: #1e1e26;
      border: 1px solid #33333d;
      border-radius: 6px;
      color: #f2f0eb;
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #f2f0eb;
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      margin-top: 0.5rem;
      padding: 0.8rem 1.8rem;
      background: #f2f0eb;
      color: #14141a;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    button:hover { transform: translateY(-2px); }
    .status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #a8a5a0;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Inkos Commissions</h1>
  <p class="subtitle">Diese Seite ist im Aufbau.</p>

  <h2 class="section-title">Tech Support</h2>
  <p class="subtitle" style="margin-bottom: 1.5rem; font-size: 0.95rem;">
    Probleme mit der Website? Fehler gefunden? Schreib mir.
  </p>

  <form id="contactForm" action="https://formspree.io/f/xeeyaong" method="POST">
    <div>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div>
      <label for="email">Deine Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div>
      <label for="message">Was ist das Problem / deine Anfrage?</label>
      <textarea id="message" name="message" required></textarea>
    </div>
    <button type="submit">Senden</button>
    <p class="status" id="statusMsg"></p>
  </form>

  <script>
    const form = document.getElementById('contactForm');
    const statusMsg = document.getElementById('statusMsg');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          statusMsg.textContent = "Danke! Deine Nachricht wurde gesendet.";
          statusMsg.style.display = 'block';
          form.reset();
        } else {
          statusMsg.textContent = "Etwas ist schiefgelaufen. Bitte versuch's nochmal.";
          statusMsg.style.display = 'block';
        }
      } catch (error) {
        statusMsg.textContent = "Etwas ist schiefgelaufen. Bitte versuch's nochmal.";
        statusMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
