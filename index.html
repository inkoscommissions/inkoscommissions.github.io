<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkos Commissions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #14141a;
      color: #f2f0eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      color: #a8a5a0;
      font-size: 1.1rem;
      max-width: 500px;
      margin-bottom: 2rem;
    }
    a.button {
      display: inline-block;
      padding: 0.8rem 1.8rem;
      background: #f2f0eb;
      color: #14141a;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      transition: transform 0.15s ease;
    }
    a.button:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <h1>Inkos Commissions</h1>
  <p>Diese Seite ist im Aufbau. Schau bald wieder vorbei.</p>
  <a class="button" href="mailto:deine-email@example.com">Kontakt aufnehmen</a>
</body>
</html>
