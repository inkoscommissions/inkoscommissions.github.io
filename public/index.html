<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkos Commissions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #100e15;
    --bg-elevated: #1a1720;
    --border: #2f2a3a;
    --text: #eeece6;
    --text-dim: #938da0;
    --accent: #b795f0;
    --accent-dim: #362c47;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(183, 149, 240, 0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(183, 149, 240, 0.05), transparent 40%);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 2rem;
    position: relative;
    z-index: 2;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg-elevated);
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    margin-bottom: 2rem;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .cursor-glow {
    position: fixed;
    top: 0;
    left: 0;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(183, 149, 240, 0.10) 0%, rgba(183, 149, 240, 0.04) 35%, transparent 70%);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
    will-change: left, top;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2.4rem, 7vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 1.2rem;
  }

  h1 span { color: var(--accent); }

  p.lead {
    color: var(--text-dim);
    font-size: 1.05rem;
    max-width: 480px;
    line-height: 1.6;
  }

  .code-label {
    margin-top: 2rem;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .code-input {
    margin-top: 0.6rem;
    width: min(280px, 100%);
    padding: 0.9rem 1rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    text-align: center;
    font-size: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }

  .code-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .code-input::placeholder { color: var(--text-dim); }

  .code-status {
    margin-top: 0.8rem;
    font-size: 0.85rem;
    min-height: 1.2em;
    color: var(--text-dim);
  }

  .code-status.err { color: #ff7d7d; }

  .result {
    margin-top: 1.5rem;
    width: min(420px, 100%);
    display: none;
  }

  .result.show { display: block; }

  .result img {
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--bg-elevated);
  }

  .download-btn {
    display: block;
    width: 100%;
    margin-top: 0.9rem;
    padding: 0.8rem;
    background: var(--accent);
    color: #100e15;
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    text-decoration: none;
    cursor: pointer;
  }

  .download-btn:hover { opacity: 0.9; }

  .footer-note {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #4d4b56;
    letter-spacing: 0.04em;
    z-index: 2;
  }

  .admin-toggle {
    position: fixed;
    top: 1.8rem;
    left: 1.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    z-index: 100;
  }

  .admin-toggle:hover {
    color: var(--accent);
    border-color: var(--accent-dim);
    transform: translateY(-2px);
  }

  .admin-toggle svg { width: 18px; height: 18px; }

  .support-toggle {
    position: fixed;
    bottom: 1.8rem;
    right: 1.8rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.85rem 1.3rem;
    background: var(--accent);
    color: #100e15;
    border: none;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(183, 149, 240, 0.25);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    z-index: 100;
  }

  .support-toggle:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(183, 149, 240, 0.35);
  }

  .support-toggle svg { width: 18px; height: 18px; }

  .support-panel {
    position: fixed;
    bottom: 5.5rem;
    right: 1.8rem;
    width: min(340px, calc(100vw - 2.4rem));
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(12px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
    z-index: 100;
  }

  .support-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .support-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.3rem;
  }

  .support-panel h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .support-panel-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.3rem;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }

  .support-panel-close:hover { color: var(--text); }

  .support-panel p.desc {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 1.1rem;
    line-height: 1.5;
  }

  .field { margin-bottom: 0.85rem; }

  .field label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.35rem;
  }

  .field input,
  .field textarea {
    width: 100%;
    padding: 0.6rem 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
  }

  .field input:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .field textarea { min-height: 80px; resize: vertical; }

  .support-panel button[type="submit"] {
    width: 100%;
    padding: 0.7rem;
    background: var(--accent);
    color: #100e15;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 0.3rem;
    transition: opacity 0.15s ease;
  }

  .support-panel button[type="submit"]:hover { opacity: 0.9; }

  .form-status {
    margin-top: 0.7rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    display: none;
    text-align: center;
  }

  @media (max-width: 480px) {
    .support-panel { right: 1.2rem; bottom: 5.2rem; }
    .support-toggle { right: 1.2rem; bottom: 1.4rem; }
  }
</style>
</head>
<body>

  <div class="cursor-glow" id="cursorGlow"></div>

  <a href="/admin/" class="admin-toggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </a>

  <div class="hero">
    <div class="badge">
      Website in Development
      <span class="badge-dot"></span>
    </div>
    <h1>Inkos <span>Commissions</span></h1>
    <p class="lead">
      This website is in Development.<br>
      come back later.
    </p>

    <p class="code-label">Enter the code for your picture here</p>
    <input id="code" class="code-input" type="text" maxlength="14" placeholder="XXXX-XXXX-XXXX">
    <p class="code-status" id="codeStatus"></p>

    <div class="result" id="result">
      <img id="resultImg" alt="Your picture">
      <a class="download-btn" id="downloadBtn" download>Download picture</a>
    </div>
  </div>

  <div class="footer-note">Made by Mo_2885</div>

  <button class="support-toggle" id="supportToggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Tech Support
  </button>

  <div class="support-panel" id="supportPanel">
    <div class="support-panel-header">
      <h2>Tech Support</h2>
      <button class="support-panel-close" id="supportClose">&times;</button>
    </div>
    <p class="desc">Having issues with the website or questions about the tech behind it? Send me a message.</p>

    <form id="contactForm" action="https://formspree.io/f/xeeyaong" method="POST">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit">Send</button>
      <p class="form-status" id="statusMsg"></p>
    </form>
  </div>

  <script>
    const cursorGlow = document.getElementById('cursorGlow');
    window.addEventListener('mousemove', (e) => {
      cursorGlow.style.left = e.clientX + 'px';
      cursorGlow.style.top = e.clientY + 'px';
    });

    const codeInput = document.getElementById('code');
    const codeStatus = document.getElementById('codeStatus');
    const result = document.getElementById('result');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');

    codeInput.addEventListener('input', () => {
      let v = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (v.length > 4) v = v.slice(0, 4) + '-' + v.slice(4);
      if (v.length > 9) v = v.slice(0, 9) + '-' + v.slice(9, 13);
      codeInput.value = v;

      result.classList.remove('show');
      setStatus('');

      if (v.length === 14) lookup(v);
    });

    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && codeInput.value.length === 14) lookup(codeInput.value);
    });

    function setStatus(msg, isErr) {
      codeStatus.textContent = msg;
      codeStatus.className = 'code-status' + (isErr ? ' err' : '');
    }

    async function lookup(code) {
      setStatus('Looking up...');
      try {
        const res = await fetch('/api/picture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });

        if (res.status === 404) return setStatus('No picture found for this code.', true);
        if (!res.ok) return setStatus('Something went wrong. Please try again.', true);

        const data = await res.json();
        resultImg.src = data.data;
        downloadBtn.href = data.data;
        downloadBtn.setAttribute('download', data.name || 'picture');
        result.classList.add('show');
        setStatus('Here is your picture!');
      } catch {
        setStatus('Something went wrong. Please try again.', true);
      }
    }

    const toggle = document.getElementById('supportToggle');
    const panel = document.getElementById('supportPanel');
    const closeBtn = document.getElementById('supportClose');

    toggle.addEventListener('click', () => panel.classList.toggle('open'));
    closeBtn.addEventListener('click', () => panel.classList.remove('open'));

    document.addEventListener('click', (e) => {
      if (!panel.contains(e.target) && !toggle.contains(e.target)) {
        panel.classList.remove('open');
      }
    });

    const form = document.getElementById('contactForm');
    const statusMsg = document.getElementById('statusMsg');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        statusMsg.style.display = 'block';
        if (response.ok) {
          statusMsg.textContent = "Thanks! Your message has been sent.";
          form.reset();
        } else {
          statusMsg.textContent = "Something went wrong. Please try again.";
        }
      } catch (error) {
        statusMsg.style.display = 'block';
        statusMsg.textContent = "Something went wrong. Please try again.";
      }
    });
  </script>

</body>
</html>
