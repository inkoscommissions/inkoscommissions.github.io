<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#100e15; --bg-elevated:#1a1720; --border:#2f2a3a;
    --text:#eeece6; --text-dim:#938da0; --accent:#b795f0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter',sans-serif; background:var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(183,149,240,.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(183,149,240,.05), transparent 40%);
    color:var(--text); min-height:100vh; display:flex;
  }
  .sidebar {
    width:240px; min-height:100vh; background:var(--bg-elevated);
    border-right:1px solid var(--border); display:flex; flex-direction:column;
    padding:1.5rem 1rem; z-index:3;
  }
  .sidebar-header {
    display:flex; align-items:center; gap:.6rem;
    padding:.5rem .6rem 1.5rem; margin-bottom:1rem;
    border-bottom:1px solid var(--border);
  }
  .sidebar-header .dot {
    width:8px; height:8px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 8px var(--accent); animation:blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  .sidebar-header span {
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:.95rem;
  }
  .sidebar-nav { display:flex; flex-direction:column; gap:.3rem; }
  .sidebar-item {
    display:flex; align-items:center; gap:.7rem; padding:.7rem .8rem;
    border-radius:8px; color:var(--text-dim); font-size:.9rem;
    cursor:pointer; user-select:none;
    transition:background .15s, color .15s;
  }
  .sidebar-item:hover { background:rgba(183,149,240,.08); color:var(--text); }
  .sidebar-item.active { background:rgba(183,149,240,.14); color:var(--text); }
  .sidebar-item svg { width:17px; height:17px; opacity:.7; flex-shrink:0; }
  .sidebar-footer { margin-top:auto; padding:.6rem; font-size:.7rem; color:#4d4b56; }

  .main { flex:1; padding:2.5rem; overflow-y:auto; }
  .view { display:none; }
  .view.active { display:block; }
  h1 { font-family:'Space Grotesk',sans-serif; font-size:1.9rem; margin-bottom:.4rem; }
  .sub { color:var(--text-dim); margin-bottom:2rem; font-size:.9rem; }

  .dropzone {
    max-width:560px; margin:0 auto;
    border:2px dashed var(--border); border-radius:16px;
    background:var(--bg-elevated); padding:3rem 2rem; text-align:center;
    cursor:pointer; transition:border-color .2s, background .2s;
  }
  .dropzone:hover, .dropzone.over {
    border-color:var(--accent); background:rgba(183,149,240,.06);
  }
  .dropzone svg { width:42px; height:42px; color:var(--text-dim); margin-bottom:1rem; }
  .dropzone p { color:var(--text-dim); font-size:.95rem; }
  .dropzone .hint { font-size:.78rem; margin-top:.4rem; color:#5f5a6b; }

  .preview { max-width:560px; margin:1.5rem auto 0; display:none; }
  .preview.show { display:block; }
  .preview img {
    width:100%; max-height:280px; object-fit:contain;
    border:1px solid var(--border); border-radius:12px; background:var(--bg-elevated);
  }
  .filename { color:var(--text-dim); font-size:.82rem; margin-top:.6rem; text-align:center; }

  .field { max-width:560px; margin:1.4rem auto 0; }
  .field label { display:block; font-size:.8rem; color:var(--text-dim); margin-bottom:.45rem; }
  .field input {
    width:100%; padding:.85rem 1rem; background:var(--bg-elevated);
    border:1px solid var(--border); border-radius:10px; color:var(--text);
    text-align:center; font-size:1rem; letter-spacing:.05em; text-transform:uppercase;
    font-family:inherit;
  }
  .field input:focus { outline:none; border-color:var(--accent); }
  .btn {
    width:100%; max-width:560px; display:block; margin:1rem auto 0;
    padding:.85rem; border:none; border-radius:10px;
    background:var(--accent); color:#100e15; font-weight:700;
    font-family:inherit; font-size:.95rem; cursor:pointer;
  }
  .btn:disabled { opacity:.5; cursor:default; }
  .status { max-width:560px; margin:.8rem auto 0; text-align:center; font-size:.85rem; min-height:1.2em; }
  .status.ok { color:#7ddf9c; }
  .status.err { color:#ff7d7d; }

  .list { max-width:560px; margin:2.5rem auto 0; }
  .list h2 { font-family:'Space Grotesk',sans-serif; font-size:1rem; margin-bottom:.8rem; }
  .list-row {
    display:flex; align-items:center; gap:.9rem;
    padding:.7rem .9rem; background:var(--bg-elevated);
    border:1px solid var(--border); border-radius:9px; margin-bottom:.5rem;
  }
  .list-thumb {
    width:52px; height:52px; flex-shrink:0;
    border-radius:7px; border:1px solid var(--border);
    background:var(--bg); object-fit:cover;
  }
  .list-thumb.empty {
    display:flex; align-items:center; justify-content:center;
    color:#4d4b56; font-size:.7rem;
  }
  .list-code { flex:1; font-size:.87rem; letter-spacing:.04em; }
  .del {
    background:none; border:none; color:var(--text-dim);
    cursor:pointer; font-size:1.2rem; line-height:1; padding:0 .3rem;
  }
  .del:hover { color:#ff7d7d; }
  .empty { color:#5f5a6b; font-size:.85rem; }

  .placeholder { text-align:center; padding-top:6rem; color:var(--text-dim); }
  .placeholder .emoji { font-size:4rem; margin-bottom:1rem; }

  @media (max-width:700px) {
    body { flex-direction:column; }
    .sidebar { width:100%; min-height:auto; }
    .sidebar-nav { flex-direction:row; overflow-x:auto; }
    .sidebar-footer { display:none; }
    .main { padding:1.5rem 1rem; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <span class="dot"></span>
    <span>Admin Panel</span>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-item active" data-view="upload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
      Load Picture
    </div>
    <div class="sidebar-item" data-view="soon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      Commissions
    </div>
    <div class="sidebar-item" data-view="soon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
      Stats
    </div>
  </nav>
  <div class="sidebar-footer">Made by Mo_2885</div>
</div>

<div class="main">

  <div class="view active" id="view-upload">
    <h1>Load Picture</h1>
    <p class="sub">Upload an image and assign the code your client will use.</p>

    <div class="dropzone" id="dropzone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
      <p>Drop picture in</p>
      <p class="hint">or click to choose &middot; max 5 MB</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" hidden>

    <div class="preview" id="preview">
      <img id="previewImg" alt="">
      <div class="filename" id="filename"></div>
    </div>

    <div class="field">
      <label for="picCode">Picture code</label>
      <input id="picCode" type="text" maxlength="14" placeholder="XXXX-XXXX-XXXX">
    </div>

    <button class="btn" id="saveBtn" disabled>Save picture</button>
    <p class="status" id="status"></p>

    <div class="list">
      <h2>Saved codes</h2>
      <div id="codeList"><p class="empty">Loading...</p></div>
    </div>
  </div>

  <div class="view" id="view-soon">
    <div class="placeholder">
      <div class="emoji">⌂</div>
      <h1>Under development</h1>
      <p class="sub">Come back later.</p>
    </div>
  </div>

</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");
const filename = document.getElementById("filename");
const picCode = document.getElementById("picCode");
const saveBtn = document.getElementById("saveBtn");
const statusEl = document.getElementById("status");
const codeList = document.getElementById("codeList");

let fileData = null, thumbData = null, fileName = "";

document.querySelectorAll(".sidebar-item").forEach(item => {
  item.addEventListener("click", () => {
    document.querySelectorAll(".sidebar-item").forEach(i => i.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    item.classList.add("active");
    document.getElementById("view-" + item.dataset.view).classList.add("active");
  });
});

dropzone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));

["dragenter","dragover"].forEach(ev =>
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add("over"); })
);
["dragleave","drop"].forEach(ev =>
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove("over"); })
);
dropzone.addEventListener("drop", e => handleFile(e.dataTransfer.files[0]));

function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith("image/")) return setStatus("Only image files allowed.", "err");
  if (file.size > 5 * 1024 * 1024) return setStatus("File too large (max 5 MB).", "err");

  const reader = new FileReader();
  reader.onload = () => {
    fileData = reader.result;
    fileName = file.name;
    previewImg.src = fileData;
    filename.textContent = file.name + " · " + Math.round(file.size / 1024) + " KB";
    preview.classList.add("show");
    setStatus("");
    makeThumb(fileData);
    checkReady();
  };
  reader.readAsDataURL(file);
}

function makeThumb(src) {
  thumbData = null;
  const img = new Image();
  img.onload = () => {
    const max = 160;
    const scale = Math.min(max / img.width, max / img.height, 1);
    const c = document.createElement("canvas");
    c.width = Math.round(img.width * scale);
    c.height = Math.round(img.height * scale);
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    try { thumbData = c.toDataURL("image/jpeg", 0.7); } catch { thumbData = null; }
  };
  img.src = src;
}

picCode.addEventListener("input", () => {
  let v = picCode.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
  if (v.length > 4) v = v.slice(0,4) + "-" + v.slice(4);
  if (v.length > 9) v = v.slice(0,9) + "-" + v.slice(9,13);
  picCode.value = v;
  checkReady();
});

function checkReady() {
  saveBtn.disabled = !(fileData && picCode.value.length === 14);
}

function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className = "status" + (cls ? " " + cls : "");
}

saveBtn.addEventListener("click", async () => {
  saveBtn.disabled = true;
  setStatus("Saving...");
  try {
    const res = await fetch("/api/upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code: picCode.value, name: fileName, data: fileData, thumb: thumbData })
    });
    if (res.ok) {
      setStatus("Saved as " + picCode.value, "ok");
      fileData = null; thumbData = null;
      preview.classList.remove("show");
      picCode.value = "";
      fileInput.value = "";
      loadCodes();
    } else if (res.status === 409) {
      setStatus("That code already exists.", "err");
    } else if (res.status === 401) {
      window.location.href = "/admin/";
    } else {
      setStatus("Upload failed.", "err");
    }
  } catch {
    setStatus("Upload failed.", "err");
  }
  checkReady();
});

async function loadCodes() {
  try {
    const res = await fetch("/api/images");
    if (!res.ok) { codeList.innerHTML = '<p class="empty">Could not load.</p>'; return; }
    const { keys } = await res.json();
    if (!keys.length) { codeList.innerHTML = '<p class="empty">No pictures yet.</p>'; return; }

    codeList.innerHTML = "";
    keys.forEach(k => {
      const row = document.createElement("div");
      row.className = "list-row";

      const ph = document.createElement("div");
      ph.className = "list-thumb empty";
      ph.textContent = "—";
      row.appendChild(ph);

      const label = document.createElement("span");
      label.className = "list-code";
      label.textContent = k;
      row.appendChild(label);

      const btn = document.createElement("button");
      btn.className = "del";
      btn.textContent = "×";
      btn.onclick = async () => {
        if (!confirm("Delete " + k + "?")) return;
        await fetch("/api/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: k })
        });
        loadCodes();
      };
      row.appendChild(btn);

      codeList.appendChild(row);
      loadThumb(k, ph);
    });
  } catch {
    codeList.innerHTML = '<p class="empty">Could not load.</p>';
  }
}

async function loadThumb(code, placeholder) {
  try {
    const res = await fetch("/api/thumb?code=" + encodeURIComponent(code));
    if (!res.ok) return;
    const { thumb } = await res.json();
    const img = document.createElement("img");
    img.className = "list-thumb";
    img.src = thumb;
    img.alt = code;
    placeholder.replaceWith(img);
  } catch {}
}

loadCodes();
</script>
</body>
</html>
